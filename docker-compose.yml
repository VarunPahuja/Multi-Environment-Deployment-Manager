version: '3.8'

# This docker-compose file sets up three deployment environments: dev, staging, and prod.
# Each service uses the exact same build image, but we pass in a different APP_ENV 
# environment variable to control the deployment environment context.

services:
  dev:
    build: .
    restart: always
    ports:
      # Maps host port 8000 to container port 8080
      - "8000:8080"
    environment:
      # Control deployment environment (development)
      - APP_ENV=development
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env

  staging:
    build: .
    restart: always
    ports:
      # Maps host port 8081 to container port 8080
      - "8081:8080"
    environment:
      # Control deployment environment (staging)
      - APP_ENV=staging
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env

  prod:
    build: .
    restart: always
    ports:
      # Maps host port 8082 to container port 8080
      - "8082:8080"
    environment:
      # Control deployment environment (production)
      - APP_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
