<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-[#0f1115] text-gray-300 font-mono min-h-screen relative overflow-hidden flex flex-col">
    <div class="fixed inset-0 cyber-grid opacity-20 pointer-events-none z-0"></div>

    <header class="border-b border-gray-800 bg-[#161b22]/80 backdrop-blur-md relative z-10 shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <div class="text-neon-cyan font-bold text-xl tracking-wider">
                        >_ LOG_VIEWER
                    </div>
                </div>
                <div class="flex space-x-4 items-center">
                    <div class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400 mr-2 border border-gray-700">
                        Host: <span class="text-white" x-text="'{{ current_env }}'.toUpperCase()"></span>
                    </div>
                    <a href="/" class="text-gray-400 hover:text-cyan-400 px-3 py-2 text-sm font-medium transition-colors">Dashboard</a>
                    <a href="/logs" class="text-cyan-400 border-b-2 border-cyan-400 px-3 py-2 text-sm font-medium">Logs</a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 relative z-10 p-4 sm:p-8 flex flex-col overflow-hidden max-w-7xl mx-auto w-full" x-data="loaddatarun()">
        
        <div class="flex gap-4 mb-4">
            <template x-for="env in ['dev', 'staging', 'prod']">
                <button @click="selectedEnv = env; fetchLogs()" 
                    class="px-4 py-2 text-sm rounded border transition-all"
                    :class="selectedEnv === env ? 'bg-cyan-900/40 text-cyan-400 border-cyan-500' : 'bg-[#161b22] text-gray-400 border-gray-800 hover:border-gray-500'">
                    <span x-text="env.toUpperCase()"></span>
                </button>
            </template>
        </div>

        <div class="terminal-window flex-1 flex flex-col overflow-hidden relative group">
            <div class="bg-[#161b22] px-4 py-2 border-b border-[#30363d] flex gap-2 items-center shrink-0">
                <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                <span class="ml-4 text-xs text-gray-500" x-text="`${selectedEnv}_container_logs.log`"></span>
                <span class="ml-auto flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-cyan-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                </span>
            </div>
            
            <pre id="terminal-content" class="flex-1 overflow-y-auto p-4 text-sm text-green-400/90 leading-tight focus:outline-none timeline-scroll whitespace-pre-wrap font-mono" x-text="logs"></pre>
            
            <div class="absolute inset-0 pointer-events-none shadow-[inset_0_0_80px_rgba(0,0,0,0.6)] border border-transparent group-hover:border-cyan-500/20 transition-colors"></div>
        </div>

    </main>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
