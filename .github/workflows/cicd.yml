name: CI/CD Pipeline

# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      # Step 4: Run linting (this satisfies the CI requirement to test code quality)
      - name: Run linting
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Step 5: Build the Docker image representing the CD part of pipeline
      - name: Build Docker image
        run: |
          docker build -t devopsproject:latest .

      # Step 6: Print a success message
      - name: Print success message
        run: |
          echo "Pipeline completed successfully! Code is linted and Docker image is built."
