apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-deployment
  labels:
    app: devops-app
spec:
  # 2 Replicas ensure high availability for the application
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-app-container
        # Using the image built by our CI/CD pipeline
        image: devopsproject:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
