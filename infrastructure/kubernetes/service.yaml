apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
  labels:
    app: devops-app
spec:
  # The service acts as a LoadBalancer to distribute traffic to deployed pods
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    # Routes traffic to pods with the app: devops-app label
    app: devops-app
